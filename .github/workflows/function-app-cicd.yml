name: Deploy Function App and Seed Cosmos

on:
  push:
    branches:
      - main
    paths:
      - 'labs/function_apps/**'
      - '.github/workflows/function-app-cicd.yml'
  workflow_dispatch:

jobs:
  deploy-function-app:
    name: Deploy Azure Function App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install app dependencies
      run: pip install -r labs/function_apps/app/requirements.txt

    - name: Deploy Function App package
      uses: Azure/functions-action@v1
      with:
        app-name: 'daily-portfolio-func'
        package: labs/function_apps/app
        publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  seed-cosmos-test-data:
    name: Seed Cosmos DB test data
    runs-on: ubuntu-latest
    needs: deploy-function-app

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install seed script dependencies
      run: pip install azure-cosmos python-dotenv

    - name: Seed test users into Cosmos DB
      env:
        COSMOS_ENDPOINT: ${{ secrets.COSMOS_ENDPOINT }}
        COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        COSMOS_DATABASE_NAME: 'portfolio-db'
        COSMOS_CONTAINER_NAME: 'users'
      run: python labs/function_apps/scripts/seed_cosmos_test_data.py
